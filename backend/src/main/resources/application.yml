spring:
  application:
    name: career-recommendation-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/career_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate       # Flyway가 DDL 관리 — JPA는 검증만
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:dummy-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:dummy-kakao-client-secret}
            client-authentication-method: client_secret_post   # 카카오 토큰 엔드포인트는 시크릿을 폼 파라미터로 받음 (기본값 basic이면 401)
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            scope: profile_nickname
#          google:                      ← 나중에 추가할 때 주석 해제
#            client-id: ${GOOGLE_CLIENT_ID}
#            client-secret: ${GOOGLE_CLIENT_SECRET}
#            redirect-uri: "{baseUrl}/login/oauth2/code/google"
#            scope: email, profile
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
#          google:                      ← 나중에 추가할 때 주석 해제

server:
  port: 8080

app:
  oauth2:
    frontend-redirect-uri: ${FRONTEND_REDIRECT_URI:http://localhost:3000/oauth/callback}
  cors:
    # 콤마로 구분해 여러 개 지정 가능 (배포 시 실제 프론트 도메인 추가)
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://*.vercel.app}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-please-change-in-production}
  access-token-expiration: 3600000      # 1시간 (ms)
  refresh-token-expiration: 604800000   # 7일 (ms)

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    base-url: https://generativelanguage.googleapis.com/v1beta
    model: gemini-2.5-flash

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.career: DEBUG
    org.springframework.security: INFO

---
# 로컬 개발 환경
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: true
  flyway:
    clean-on-validation-error: true   # 로컬에서만 허용

---
# 프로덕션 환경
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

server:
  # nginx 등 리버스 프록시 뒤에서 X-Forwarded-* 헤더를 신뢰해야
  # OAuth redirect-uri의 {baseUrl}이 실제 도메인으로 올바르게 만들어짐
  forward-headers-strategy: framework

logging:
  level:
    com.career: INFO
